<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧠</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Deep Learning Mastery | University Exam Prep</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css" />
    <!-- Suppress Vercel Toolbar Console Warnings -->
    <script>
      const originalConsoleWarn = console.warn;
      const originalConsoleError = console.error;
      
      console.warn = function(...args) {
        if (args[0] && typeof args[0] === 'string' && (args[0].includes('zustand') || args[0].includes('DialogContent') || args[0].includes('DialogTitle'))) {
          return; // Ignore Vercel Toolbar warnings
        }
        originalConsoleWarn.apply(console, args);
      };
      
      console.error = function(...args) {
        if (args[0] && typeof args[0] === 'string' && (args[0].includes('zustand') || args[0].includes('DialogContent') || args[0].includes('DialogTitle'))) {
          return; // Ignore Vercel Toolbar errors
        }
        originalConsoleError.apply(console, args);
      };
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
